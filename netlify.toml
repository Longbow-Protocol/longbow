# Netlify build config for the Longbow web app (Next.js in ./frontend).
# The app is a fully static Next.js export (output: "export" -> ./frontend/out),
# so we publish that folder directly. No serverless runtime required.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
